<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Artist Tagger · SK Music</title>
<meta name="description" content="SK Music — help tag artists for the shared music catalog.">
<meta property="og:title" content="Artist Tagger · SK Music"><meta property="og:description" content="Help tag artists for SK Music.">
<style>
  :root{--bg:#0f172a;--card:#1e293b;--card2:#243244;--line:#334155;--text:#e2e8f0;--muted:#94a3b8;--faint:#64748b;
        --il:#3b82f6;--ilbg:#1e3a5f;--yes:#22c55e;--no:#475569;--warn:#f59e0b;--ok:#4ade80}
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
  header{position:sticky;top:0;z-index:20;background:rgba(15,23,42,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:11px 20px}
  .row{display:flex;align-items:center;gap:11px;flex-wrap:wrap}
  h1{font-size:16px;margin:0;font-weight:700;letter-spacing:-.01em}
  .stats{color:var(--muted);font-size:12.5px;display:flex;gap:14px;flex-wrap:wrap}
  .stats b{color:var(--text);font-variant-numeric:tabular-nums}
  .stats .y b{color:#93c5fd}
  .bar{height:7px;background:var(--card);border-radius:5px;overflow:hidden;margin-top:9px}
  .bar>div{height:100%;background:linear-gradient(90deg,var(--il),var(--yes));width:0;transition:width .25s}
  input.search{background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:8px 13px;font-size:14px;min-width:190px;flex:1;max-width:300px;outline:none}
  input.search:focus{border-color:var(--il)}
  button{cursor:pointer;font:inherit;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:9px;padding:8px 13px;white-space:nowrap}
  button:hover{background:var(--card2);border-color:#3f5169}
  button.primary{background:var(--il);border-color:var(--il);color:#fff}
  button.primary:hover{background:#2f74e0}
  button.warn{border-color:#5a4413;color:#fbbf24}
  button.warn:hover{background:#3a2e0f}
  .sub{color:var(--muted);font-size:12px;padding:3px 20px 0;display:flex;gap:16px;flex-wrap:wrap;align-items:center}
  .sub a{color:var(--muted);text-decoration:underline;cursor:pointer}
  .sub .who b{color:var(--text)}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:12px;padding:16px 20px 80px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px;display:flex;flex-direction:column;gap:11px;animation:pop .12s ease}
  @keyframes pop{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:none}}
  .who-r{display:flex;align-items:center;gap:11px;min-width:0}
  .who-r img{width:46px;height:46px;border-radius:50%;object-fit:cover;background:var(--card2);flex:none}
  .who-r .nm{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14.5px}
  .who-r .id{color:var(--faint);font-size:10.5px;font-family:ui-monospace,monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;cursor:copy}
  .who-r .id:hover{color:var(--muted)}
  .meta{display:flex;align-items:center;justify-content:space-between;gap:8px;min-height:16px}
  .badges{display:flex;gap:5px;flex-wrap:wrap}
  .badge{font-size:10px;padding:1px 7px;border-radius:20px;background:var(--card2);color:var(--muted)}
  .lbl{font-size:11px;font-weight:600;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px}
  .lbl.y{color:#93c5fd}.lbl.n{color:var(--muted)}
  .lbl .by{color:var(--faint);font-weight:400}
  .acts{display:flex;gap:8px}
  .acts button{flex:1;padding:9px 4px;font-weight:600}
  .btn-yes{background:var(--ilbg);border-color:#2c5589;color:#bfdbfe}
  .btn-yes:hover{background:var(--il);border-color:var(--il);color:#fff}
  .btn-no:hover{background:var(--no);border-color:#5b6b82;color:#fff}
  .btn-clr{flex:0 0 auto!important;color:var(--faint)}
  .empty{grid-column:1/-1;padding:70px 20px;text-align:center;color:var(--muted);font-size:15px;line-height:1.6}
  .empty .big{font-size:34px;margin-bottom:8px}
  .menu{position:relative;display:inline-block}
  .menu-pop{position:absolute;right:0;top:calc(100% + 7px);background:var(--card);border:1px solid var(--line);border-radius:11px;padding:6px;display:none;flex-direction:column;gap:2px;min-width:250px;box-shadow:0 14px 40px rgba(0,0,0,.5)}
  .menu-pop.on{display:flex}
  .menu-pop button{text-align:left;border:0;background:transparent;padding:9px 11px;font-size:13px;border-radius:7px}
  .menu-pop button:hover{background:var(--card2)}
  .menu-pop small{color:var(--faint);display:block;font-size:11px;font-weight:400;margin-top:1px}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--line);color:var(--text);padding:11px 18px;border-radius:11px;font-size:13.5px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.4)}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  /* ---- mobile ---- */
  @media (max-width:640px){
    header{padding:9px 12px}
    h1{font-size:14.5px;flex:1 1 auto}
    .row{gap:8px}
    #hspacer{display:none}                                    /* drop the desktop right-spacer so items pack + wrap cleanly */
    .stats{font-size:11.5px;gap:10px}
    input.search{min-width:0;max-width:none;flex:1 1 150px;padding:9px 12px}  /* search shares a row with the buttons, grows to fill */
    #reviewBtn,#refreshBtn,#undoBtn{padding:9px 11px}
    .bar{margin-top:8px}
    .sub{padding:5px 12px 0;font-size:11px;gap:10px}
    .sub>span:last-child{display:none}                        /* hide the long explainer on phones */
    .grid{grid-template-columns:1fr;gap:10px;padding:12px 12px 90px}
    .card{padding:12px 13px;gap:10px}
    .who-r img{width:44px;height:44px}
    .acts{gap:9px}
    .acts button{padding:13px 4px}                            /* bigger tap targets for Tag / Not */
  }
</style>
</head>
<body>
<header>
  <div class="row">
    <h1 id="h1">Artist Tagger</h1>
    <div class="stats" id="stats"></div>
    <div id="hspacer" style="flex:1;min-width:10px"></div>
    <input class="search" id="search" placeholder="Search artists…" autocomplete="off" spellcheck="false">
    <button id="reviewBtn" title="Show artists already tagged (by anyone) to review or change them">Review</button>
    <button id="refreshBtn" title="Pull the latest tags from everyone now">⟳</button>
    <button id="undoBtn" title="Undo your last change">↶</button>
  </div>
  <div class="bar"><div id="progbar"></div></div>
  <div class="sub">
    <span id="sync"></span>
    <span class="who" id="who"></span>
    <span style="color:var(--faint)">Tag / Not — it saves to the shared database and hides. Everyone sees the same list; work is auto-synced every 20s.</span>
  </div>
</header>

<div class="grid" id="grid"></div>
<div id="sentinel" style="height:1px"></div>
<div class="toast" id="toast"></div>

const save = () => { try { localStorage.setItem(KEY, JSON.stringify(tags)); } catch {} };
const byName = (a, b) => (a.name || "").localeCompare(b.name || "", undefined, { sensitivity: "base" });
const nameOf = (() => { const m = new Map(ARTISTS.map(a => [a.id, a.name])); return id => m.get(id) || null; })();

/* ---------- counts / status ---------- */
function counts() { let y = 0, n = 0; for (const k in tags) { if (tags[k] === true) y++; else if (tags[k] === false) n++; } return { total: ARTISTS.length, yes: y, no: n, tagged: y + n, remaining: ARTISTS.length - (y + n) }; }
function renderStats() {
  const c = counts();
  el("stats").innerHTML =
    `<span>Tagged <b>${c.tagged.toLocaleString()}</b> / ${c.total.toLocaleString()}</span>` +
    `<span class="y">${CFG.emoji} <b>${c.yes.toLocaleString()}</b></span>` +
    `<span>Not <b>${c.no.toLocaleString()}</b></span>` +
    `<span>Left <b>${c.remaining.toLocaleString()}</b></span>`;
  el("progbar").style.width = (c.total ? (c.tagged / c.total * 100) : 0) + "%";
}
function renderSync() {
  const s = el("sync"), p = Object.keys(pending).length;
  if (noTable) s.innerHTML = `<span style="color:var(--warn)"><span class="dot" style="background:var(--warn)"></span>Table not set up — run the SQL, then ⟳</span>`;
  else if (online === null) s.innerHTML = `<span style="color:var(--muted)"><span class="dot" style="background:var(--muted)"></span>Connecting…</span>`;
  else if (!online) s.innerHTML = `<span style="color:var(--warn)"><span class="dot" style="background:var(--warn)"></span>Offline — retrying${p ? " (" + p + " queued)" : ""}</span>`;
  else s.innerHTML = p ? `<span style="color:var(--warn)"><span class="dot" style="background:var(--warn)"></span>Syncing ${p}…</span>` : `<span style="color:var(--ok)"><span class="dot" style="background:var(--ok)"></span>Synced</span>`;
}
function renderWho() { el("who").innerHTML = contributor ? `You: <b>${esc(contributor)}</b> <a onclick="changeWho()">(change)</a>` : `<a style="color:var(--warn)" onclick="changeWho()">⚠ Set your name to start →</a>`; }
function changeWho() { const n = prompt("Your name / handle — shown as the contributor on tags you set:", contributor || ""); if (n && n.trim()) { contributor = n.trim().slice(0, 40); localStorage.setItem(WHOKEY, contributor); renderWho(); } }

/* ---------- render ---------- */
function cardHTML(a) {
  const set = tags[a.id];
  const badges = [a.isAmerican && "🇺🇸 American", a.isFemale && "female", a.isChasid && "chasid", a.isKidZone && "kids", a.isFamous && "★ famous", a.isDJ && "DJ"].filter(Boolean).map(b => `<span class="badge">${b}</span>`).join("");
  const img = a.thumbnail ? `<img src="${esc(a.thumbnail)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.visibility='hidden'">` : `<img alt="">`;
  const acts = mode === "review"
    ? `<div class="acts"><button class="btn-yes" onclick="setTag('${a.id}',true)">${CFG.emoji} ${CFG.label}</button><button class="btn-no" onclick="setTag('${a.id}',false)">Not</button><button class="btn-clr" onclick="clearTag('${a.id}')">✕</button></div>`
    : `<div class="acts"><button class="btn-yes" onclick="setTag('${a.id}',true)">${CFG.emoji} ${CFG.label}</button><button class="btn-no" onclick="setTag('${a.id}',false)">Not ${CFG.label}</button></div>`;
  const by = taggedBy[a.id] ? ` <span class="by">· ${esc(taggedBy[a.id])}</span>` : "";
  const label = mode === "review" ? `<span class="lbl ${set ? "y" : "n"}">${set ? CFG.emoji + " " + CFG.label : "Not"}${by}</span>` : "";
  return `<div class="card" id="c_${a.id}"><div class="who-r">${img}<div style="min-width:0"><div class="nm">${esc(a.name)}</div></div></div><div class="meta"><div class="badges">${badges}</div>${label}</div>${acts}</div>`;
}
function visible() {
  const q = query.trim().toLowerCase();
  return ARTISTS.filter(a => { const t = a.id in tags; if (mode === "review" ? !t : t) return false; if (q && !(a.name || "").toLowerCase().includes(q)) return false; return true; }).sort(byName);
}
const PAGE = 100; // render this many cards at a time; the rest stream in on scroll (fast first paint)
function render() {
  const list = visible(), g = el("grid");
  if (!list.length) {
    const c = counts();
    g.innerHTML = mode === "review"
      ? `<div class="empty"><div class="big">🗂️</div>${query ? "No tagged artists match your search." : "Nothing tagged yet."}</div>`
      : (query ? `<div class="empty"><div class="big">🔍</div>No untagged artists match “${esc(query)}”.</div>`
               : `<div class="empty"><div class="big">🎉</div>All ${c.total.toLocaleString()} artists tagged!<br><b>${c.yes.toLocaleString()}</b> ${CFG.label} · <b>${c.no.toLocaleString()}</b> not.</div>`);
    renderStats(); return;
  }
  g.innerHTML = list.slice(0, PAGE).map(cardHTML).join(""); // first page only
  renderStats();
  fillViewport();
}
// Append the next batch of visible artists not already on the page (robust to cards removed while tagging).
function renderMore() {
  const g = el("grid"); if (g.querySelector(".empty")) return 0;
  const have = new Set(); for (const c of g.children) if (c.id) have.add(c.id.slice(2));
  const next = []; for (const a of visible()) { if (!have.has(a.id)) { next.push(a); if (next.length >= PAGE) break; } }
  if (next.length) g.insertAdjacentHTML("beforeend", next.map(cardHTML).join(""));
  return next.length;
}
function nearBottom() { return window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 700; }
function fillViewport() { let guard = 0; while (nearBottom() && renderMore() > 0 && guard++ < 40) {} } // keep loading until the viewport is covered or nothing's left

/* ---------- tag actions (write-through to Supabase) ---------- */
function setTag(id, val) {
  if (!contributor) { changeWho(); if (!contributor) { toast("Set your name first."); return; } }
  undoStack.push({ id, prev: (id in tags) ? tags[id] : undefined }); if (undoStack.length > 300) undoStack.shift();
  tags[id] = val; taggedBy[id] = contributor; save();
  if (mode === "untagged") { const c = el("c_" + id); if (c) c.remove(); renderStats(); if (!el("grid").querySelector(".card")) render(); else fillViewport(); }
  else render();
  push(id, nameOf(id), val);
}
function clearTag(id) { undoStack.push({ id, prev: tags[id] }); delete tags[id]; delete taggedBy[id]; save(); render(); del(id); }
function undo() {
  const u = undoStack.pop(); if (!u) { toast("Nothing to undo."); return; }
  if (u.prev === undefined) { delete tags[u.id]; delete taggedBy[u.id]; save(); render(); del(u.id); }
  else { tags[u.id] = u.prev; taggedBy[u.id] = contributor; save(); render(); push(u.id, nameOf(u.id), u.prev); }
  toast("Undone.");
}
function copyId(id) { navigator.clipboard && navigator.clipboard.writeText(id).then(() => toast("Copied " + id)).catch(() => {}); }

/* ---------- Supabase I/O ---------- */
async function push(id, name, val) {
  pending[id] = { name, val }; renderSync();
  try {
    const r = await fetch(REST, { method: "POST", headers: { ...sbHdr(), Prefer: "resolution=merge-duplicates,return=minimal" }, body: JSON.stringify({ channel_id: id, name, [CFG.col]: val, contributor: contributor || "anon" }) });
    if (r.status === 404) { noTable = true; online = false; renderSync(); return; }
    if (!r.ok) throw new Error(r.status);
    delete pending[id]; online = true; noTable = false;
  } catch { online = false; }
  renderSync();
}
async function del(id) {
  try { const r = await fetch(REST + "?channel_id=eq." + encodeURIComponent(id), { method: "DELETE", headers: sbHdr() }); if (!r.ok && r.status !== 404) throw new Error(r.status); delete pending[id]; online = true; }
  catch { online = false; } renderSync();
}
function flush() { for (const id in pending) push(id, pending[id].name, pending[id].val); }
async function pull(initial) {
  let rows = [];
  try {
    const PAGE = 1000; // PostgREST caps each response at 1000 rows — page through offsets to get them all
    for (let from = 0; ; from += PAGE) {
      const r = await fetch(REST + "?select=channel_id," + CFG.col + ",contributor&order=channel_id&limit=" + PAGE + "&offset=" + from, { headers: sbHdr() });
      if (r.status === 404) { noTable = true; online = false; renderSync(); return; }
      if (!r.ok) throw new Error(r.status);
      const chunk = await r.json();
      rows = rows.concat(chunk);
      if (chunk.length < PAGE) break;
    }
  } catch { online = false; renderSync(); return; }
  online = true; noTable = false;
  const server = {}, by = {};
  for (const row of rows) { server[row.channel_id] = row[CFG.col]; by[row.channel_id] = row.contributor || "?"; }
  if (initial) { for (const id in tags) if (!(id in server) && !(id in pending)) pending[id] = { name: nameOf(id), val: tags[id] }; } // migrate any pre-sync local work
  const prev = tags;
  const next = Object.assign({}, server); for (const id in pending) next[id] = pending[id].val;
  tags = next; taggedBy = by; for (const id in pending) taggedBy[id] = contributor || "anon";
  save(); reconcile(prev, next); renderSync();
  flush();
}
function reconcile(prev, next) {
  if (mode !== "untagged") { render(); return; }
  let removed = 0, needFull = false;
  for (const id in next) if (!(id in prev)) { const c = el("c_" + id); if (c) { c.remove(); removed++; } }
  for (const id in prev) if (!(id in next)) needFull = true; // a tag was cleared elsewhere → should reappear
  if (needFull) render(); else { if (!el("grid").querySelector(".card")) render(); else { renderStats(); fillViewport(); } }
  if (removed && everSyncedOnce) toast(`+${removed} tagged by others`);
  everSyncedOnce = true;
}

/* ---------- wiring ---------- */
el("search").addEventListener("input", e => { query = e.target.value; render(); });
el("reviewBtn").addEventListener("click", () => { mode = mode === "review" ? "untagged" : "review"; el("reviewBtn").textContent = mode === "review" ? "← Tagging" : "Review"; el("reviewBtn").classList.toggle("primary", mode === "review"); render(); });
el("refreshBtn").addEventListener("click", () => { toast("Refreshing…"); pull(false); });
el("undoBtn").addEventListener("click", undo);
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT") { if (e.key === "Escape") { e.target.value = ""; query = ""; render(); e.target.blur(); } return; }
  if ((e.key === "z" && (e.ctrlKey || e.metaKey)) || e.key === "u") { e.preventDefault(); undo(); }
  else if (e.key === "/") { e.preventDefault(); el("search").focus(); }
});
// Load more as the bottom sentinel approaches the viewport (canonical infinite-scroll trigger)…
try { new IntersectionObserver(es => { if (es.some(e => e.isIntersecting)) fillViewport(); }, { rootMargin: "700px" }).observe(el("sentinel")); } catch {}
// …plus a scroll fallback (setTimeout, not rAF, so it fires even in a background tab).
let _sTick = false;
window.addEventListener("scroll", () => { if (_sTick) return; _sTick = true; setTimeout(() => { _sTick = false; fillViewport(); }, 90); }, { passive: true });
window.addEventListener("resize", () => fillViewport());

/* ---------- boot ---------- */
el("h1").textContent = CFG.emoji + " " + CFG.title; document.title = CFG.title + " · SK Music";
render(); renderStats(); renderWho(); renderSync();
if (!contributor) changeWho();
pull(true);
setInterval(() => pull(false), 20000);
window.addEventListener("online", () => { online = true; renderSync(); flush(); pull(false); });
window.addEventListener("offline", () => { online = false; renderSync(); });
</script>
</body>
</html>
