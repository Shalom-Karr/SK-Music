<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SK Music</title>
<style>
  :root { color-scheme: dark; --bg:#0e0a0b; --g1:#17100f; --g2:#0b0809; --text:#f6ece8; --muted:#b09a93; --primary:#ff5d6b; --primary-2:#ff8189; --line:rgba(255,240,235,.10); }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: grid; place-items: center;
    background: radial-gradient(1200px 800px at 50% -10%, var(--g1), var(--bg) 60%, var(--g2));
    color: var(--text);
    font: 15px/1.55 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-user-select: none; user-select: none; overflow: hidden;
  }
  .wrap { text-align: center; width: min(360px, 82vw); padding: 24px; }
  .logo { width: 104px; height: 104px; border-radius: 24px; box-shadow: 0 18px 50px -12px rgba(0,0,0,.75), 0 0 0 1px var(--line); animation: rise .5s ease both; }
  @keyframes rise { from { opacity: 0; transform: translateY(10px) scale(.96); } }
  h1 { margin: 22px 0 6px; font-size: 22px; font-weight: 650; letter-spacing: -.01em; background: linear-gradient(120deg, var(--primary-2), var(--primary) 60%, #f0b35a); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .status { margin: 0; color: var(--muted); font-size: 13px; min-height: 1.55em; }
  .spinner { width: 28px; height: 28px; margin: 26px auto 0; border: 3px solid rgba(255,240,235,.12); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .spinner { animation-duration: 1.6s; } .logo { animation: none; } }
  .retry { margin-top: 24px; display: none; }
  button { font: inherit; font-weight: 600; color: #fff; background: var(--primary); border: 0; border-radius: 11px; padding: 11px 26px; cursor: pointer; transition: background .15s, transform .05s; }
  button:hover { background: #ff4757; }
  button:active { transform: translateY(1px); }
  button:focus-visible { outline: 2px solid var(--primary-2); outline-offset: 2px; }
  body.fail .spinner { display: none; }
  body.fail .retry { display: block; }
  body.fail .status { color: #ffb3ba; }
</style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="logo.png" alt="SK Music" />
    <h1>SK Music</h1>
    <p class="status" id="status">Connecting…</p>
    <div class="spinner" aria-hidden="true"></div>
    <div class="retry"><button id="retry" type="button">Try again</button></div>
  </div>
<script>
  // Thin native shell: probe that the SK Music origin is reachable (cross-origin <img> load fires
  // onload if reachable, onerror if a network filter blocks it), then hand the same webview over to
  // the live app. If it's blocked, show a retry instead of a raw WebView2 error page.
  var SITE = "https://skmusic.shalomkarr.workers.dev";
  var statusEl = document.getElementById("status");
  var done = false, timer = null;
  function enter() { if (done) return; done = true; location.replace(SITE); }
  function fail() {
    if (done) return;
    document.body.classList.add("fail");
    statusEl.textContent = "Couldn't reach SK Music. Check your internet or network filter, then try again.";
  }
  function attempt() {
    if (done) return;
    clearTimeout(timer);
    document.body.classList.remove("fail");
    statusEl.textContent = "Connecting…";
    var img = new Image();
    timer = setTimeout(fail, 9000);
    img.onload = function () { clearTimeout(timer); enter(); };
    img.onerror = function () { clearTimeout(timer); fail(); };
    img.src = SITE + "/favicon.ico?_=" + Date.now();
  }
  document.getElementById("retry").addEventListener("click", attempt);
  attempt();
</script>
</body>
</html>
